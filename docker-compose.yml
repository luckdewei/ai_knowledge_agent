# AI Knowledge Agent 本地开发基础设施
# 启动: docker compose up -d
# 停止: docker compose down

version: '3.8'

services:
  # PostgreSQL + pgvector 向量数据库
  # 用于存储知识库文档、向量嵌入及元数据
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pka-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: knowledge_db
    ports:
      - '5432:5432' # 主机端口:容器端口
    volumes:
      - postgres_data:/var/lib/postgresql/data # 持久化数据库文件
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # 首次启动时自动执行初始化脚本
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存 / 消息队列
  # 用于会话缓存、任务队列等
  redis:
    image: redis:7-alpine
    container_name: pka-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data # 持久化 AOF 日志
    command: redis-server --appendonly yes # 开启 AOF 持久化

# 命名卷，容器删除后数据仍保留
volumes:
  postgres_data:
  redis_data:
